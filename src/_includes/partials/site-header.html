<header class="site-header">
	<div class="site-header-layout wrapper">
		<div>
			<a
				href="/"
				aria-label="Homepage"
				rel="me"
				class="logo"
				>Germán Freixinós López</a
			>
		</div>

		<nav class="site-nav">
			<ul
				role="list"
				class="site-nav-layout"
			>
				{% for item in navigation.items %}
				<li>
					<a
						href="{{ item.url }}"
						class="site-nav-link"
						{{
						helpers.getLinkActiveState(item.url,
						page.url)
						|
						safe
						}}
						>{{ item.text }}</a
					>
				</li>
				{% endfor %}
			</ul>
		</nav>
	</div>
</header>
