<header class="[ site-header ] [ font-semibold ]">
	<div class="wrapper">
		<div class="site-header__inner">
			<a
				href="/"
				aria-label="Homepage"
				class="text-step-1"
				>Germán Freixinós López</a
			>

			<nav>
				<ul
					role="list"
					class="[ site-nav ] [ l-cluster-md ]"
				>
					{% for item in navigation.items %}
					<li>
						<a
							href="{{ item.url }}"
							{{
							helpers.getLinkActiveState(item.url,
							page.url)
							|
							safe
							}}
							>{{ item.text }}</a
						>
					</li>
					{% endfor %}
				</ul>
			</nav>
		</div>
	</div>
</header>
